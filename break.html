   <p> Six humans trapped by happenstance
In bleak and bitter cold.<br>
Each one possessed a stick of wood
Or so the story’s told.<br></p>
 
<p>><b>Their dying fire</b> in need of logs
<i>The</i> first man held his back<br>
For of the faces round the fire
<u>He noticed one was black</u>.</p>
